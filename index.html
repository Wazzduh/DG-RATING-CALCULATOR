<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Disc Golf Rating Calc</title>

<style>
body { font-family: -apple-system, system-ui, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; margin: 0; }
.app-container { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1 { color: #4caf50; font-size: 1.5rem; text-align: center; margin-bottom: 25px; }
.section-label { color: #4caf50; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px; }
label { display: block; font-size: 0.85rem; color: #999; margin-bottom: 5px; margin-left: 5px; }
input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #333; border-radius: 12px; background: #2a2a2a; color: white; font-size: 1.1rem; box-sizing: border-box; outline: none; }
input:focus { border-color: #4caf50; }
button { width: 100%; padding: 18px; background: #4caf50; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
#result { margin-top: 30px; padding: 20px; background: #2a2a2a; border-radius: 15px; display: none; border: 1px solid #4caf50; }
.res-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 1.1rem; align-items: center; }
.val { color: #4caf50; font-weight: bold; font-size: 1.6rem; }
</style>
</head>

<body>
<div class="app-container">
<h1>Rating Target Calc</h1>

<div class="section-label">Your Goal</div>
<label>Target PDGA Rating</label>
<input type="number" id="goalPDGA" value="900">

<div class="section-label">Course Details</div>
<label>Current UDisc Rating (for your score)</label>
<input type="number" id="curRate" value="137">

<label>Total Holes</label>
<input type="number" id="holes" value="9">

<button onclick="calc()">Calculate</button>

<div id="result">
<div class="res-row">
<span>Strokes Needed:</span>
<span id="strokes" class="val">--</span>
</div>

<div class="res-row">
<span>Target vs Current:</span>
<span id="relative" class="val">--</span>
</div>
</div>
</div>

<script>
function calc() {
    const goalPDGA = parseFloat(document.getElementById('goalPDGA').value);
    const curUDisc = parseFloat(document.getElementById('curRate').value);
    const h = parseInt(document.getElementById('holes').value);

    const targetUDisc = (goalPDGA - 500) / 2;

    const ptsPerStroke = (18 / h) * 10;

    const ratingGap = targetUDisc - curUDisc;

    const strokesNeeded = Math.round(ratingGap / ptsPerStroke);

    document.getElementById('strokes').innerText = strokesNeeded;
    document.getElementById('relative').innerText = 
        (strokesNeeded > 0 ? "-" : "+") + Math.abs(strokesNeeded);

    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
