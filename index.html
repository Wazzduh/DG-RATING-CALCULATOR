<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Disc Golf Rating Calc</title>
<style>
body { font-family: -apple-system, system-ui, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; margin: 0; }
.app-container { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1 { color: #4caf50; font-size: 1.5rem; text-align: center; margin-bottom: 25px; }
.section-label { color: #4caf50; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px; }
label { display: block; font-size: 0.85rem; color: #999; margin-bottom: 5px; margin-left: 5px; }
input { width: 100%; padding: 15px; margin-bottom: 16px; border: 1px solid #333; border-radius: 12px; background: #2a2a2a; color: white; font-size: 1.1rem; box-sizing: border-box; outline: none; }
input:focus { border-color: #4caf50; }
button { width: 100%; padding: 18px; background: #4caf50; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: transform 0.1s; margin-top: 8px; }
button:active { transform: scale(0.98); background: #45a049; }
.secondary-btn { background: #2f7d32; }
#result, #scoreResult { margin-top: 24px; padding: 20px; background: #2a2a2a; border-radius: 15px; display: none; border: 1px solid #4caf50; }
.res-row { display: flex; justify-content: space-between; gap: 12px; margin: 10px 0; font-size: 1.05rem; align-items: center; }
.val { color: #4caf50; font-weight: bold; font-size: 1.5rem; text-align: right; }
.sub-text { font-size: 0.8rem; color: #888; margin-top: -10px; margin-bottom: 15px; padding-left: 5px; }
.helper { font-size: 0.85rem; color: #aaa; margin: 8px 2px 0; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="app-container">
    <h1>Rating Target Calc</h1>

    <div class="section-label">Your Goal</div>
    <label>Target PDGA SSA Rating</label>
    <input type="number" id="goalPDGA" value="900" inputmode="numeric">
    <div class="sub-text">Typical: 850 (Rec), 900 (Int), 935 (Adv)</div>

    <div class="section-label">Course Details</div>
    <label>Par Rating (UDisc Rating for Par)</label>
    <input type="number" id="curRate" value="137" inputmode="decimal">

    <label>Total Holes</label>
    <input type="number" id="holes" value="9" inputmode="numeric">

    <label>Course Par</label>
    <input type="number" id="par" value="31" inputmode="numeric">

    <button onclick="calcTarget()">Calculate Target</button>

    <div id="result">
        <div class="res-row"><span>Final Score Needed:</span><span id="tScore" class="val">--</span></div>
        <div class="res-row"><span>Target vs Par:</span><span id="tPar" class="val">--</span></div>
    </div>

    <div id="scoreSection" class="hidden">
        <div class="section-label">After Your Round</div>
        <label>My Score</label>
        <input type="number" id="myScore" placeholder="Enter your score" inputmode="numeric">
        <button class="secondary-btn" onclick="calcMyRating()">Calculate My Rating</button>

        <div id="scoreResult">
            <div class="res-row"><span>Your SSA Rating:</span><span id="myPDGA" class="val">--</span></div>
            <div class="res-row"><span>Round vs Par:</span><span id="myPar" class="val">--</span></div>
        </div>
    </div>
</div>

<script>
function fmtPar(n) {
    return (n > 0 ? '+' : '') + n;
}

function getInputs() {
    const goalPDGA = parseFloat(document.getElementById('goalPDGA').value);
    const curUDisc = parseFloat(document.getElementById('curRate').value);
    const holes = parseInt(document.getElementById('holes').value);
    const par = parseInt(document.getElementById('par').value);

    if (isNaN(goalPDGA) || isNaN(curUDisc) || isNaN(holes) || isNaN(par) || holes <= 0) {
        alert('Please enter valid numbers for all fields.');
        return null;
    }

    return { goalPDGA, curUDisc, holes, par };
}

function calcTarget() {
    const vals = getInputs();
    if (!vals) return;

    const { goalPDGA, curUDisc, holes, par } = vals;
    const targetUDisc = (goalPDGA - 500) / 2;
    const ptsPerStroke = (18 / holes) * 10;
    const ratingGap = targetUDisc - curUDisc;
    const strokesNeeded = Math.round(ratingGap / ptsPerStroke);

    const finalScore = par - strokesNeeded;
    const relative = finalScore - par;

    document.getElementById('tScore').innerText = finalScore;
    document.getElementById('tPar').innerText = fmtPar(relative);
    document.getElementById('result').style.display = 'block';
    document.getElementById('scoreSection').classList.remove('hidden');
}

function calcMyRating() {
    const vals = getInputs();
    if (!vals) return;

    const myScore = parseFloat(document.getElementById('myScore').value);
    if (isNaN(myScore)) {
        alert('Please enter your score.');
        return;
    }

    const { curUDisc, holes, par } = vals;
    const ptsPerStroke = (18 / holes) * 10;
    const scoreVsPar = myScore - par;

    const myUDisc = curUDisc - (scoreVsPar * ptsPerStroke);
    const myPDGA = myUDisc * 2 + 500;

    document.getElementById('myPDGA').innerText = Math.round(myPDGA);
    document.getElementById('myPar').innerText = fmtPar(scoreVsPar);
    document.getElementById('scoreResult').style.display = 'block';
}
</script>
</body>
</html>
